<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flores para a minha querida e amada Flor</title>
    <style>
      :root {
        --bg-top: #09111f;
        --bg-bottom: #03050b;
        --glow: rgba(255, 148, 177, 0.35);
        --text: #fff4f8;
        --rose-main: #ff2a3f;
        --rose-light: #ff5968;
        --rose-dark: #9f1024;
        --leaf-main: #58b85b;
        --leaf-dark: #2d8f43;
        --stem: #4daa57;
        --wrap-main: #f7bcc8;
        --wrap-shadow: #ef97ad;
        --wrap-edge: #ffd6de;
        --ribbon: #f28aa6;
        --ribbon-dark: #dc6b89;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 176, 202, 0.12), transparent 30%),
          radial-gradient(circle at 50% 30%, rgba(255, 103, 143, 0.15), transparent 35%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom) 70%);
        overflow-x: hidden;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem 1rem 3rem;
        isolation: isolate;
      }

      .scene::before,
      .scene::after {
        content: "";
        position: absolute;
        inset: auto;
        border-radius: 50%;
        filter: blur(70px);
        z-index: -2;
      }

      .scene::before {
        width: min(42vw, 280px);
        height: min(42vw, 280px);
        top: 10%;
        left: 12%;
        background: rgba(255, 118, 145, 0.12);
      }

      .scene::after {
        width: min(50vw, 360px);
        height: min(50vw, 360px);
        right: 8%;
        bottom: 10%;
        background: rgba(255, 190, 215, 0.08);
      }

      h1 {
        width: min(92vw, 820px);
        margin: 0;
        text-align: center;
        font-size: clamp(1.9rem, 4vw, 3.4rem);
        line-height: 1.15;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-wrap: balance;
        text-shadow: 0 0 18px rgba(255, 146, 176, 0.25);
        animation: fade-in 1.6s ease both;
      }

      .subtitle-glow {
        position: absolute;
        top: clamp(3rem, 8vw, 4.8rem);
        width: min(65vw, 520px);
        height: 44px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 165, 192, 0.22), transparent 68%);
        filter: blur(18px);
        z-index: -1;
      }

      .sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .sparkles span {
        position: absolute;
        width: var(--size);
        height: var(--size);
        left: var(--left);
        top: var(--top);
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 24%, rgba(255, 196, 214, 0.65) 40%, transparent 75%);
        box-shadow: 0 0 12px rgba(255, 185, 205, 0.35);
        opacity: 0.45;
        animation: drift var(--duration) ease-in-out infinite;
        animation-delay: var(--delay);
      }

      .bouquet-wrap {
        position: relative;
        width: min(92vw, 660px);
        aspect-ratio: 1 / 1.08;
        display: grid;
        place-items: center;
        animation: float-bouquet 4.8s ease-in-out infinite;
      }

      .bouquet {
        position: relative;
        width: min(86vw, 500px);
        aspect-ratio: 1 / 1.02;
        filter: drop-shadow(0 28px 26px rgba(0, 0, 0, 0.28));
      }

      .paper-shadow {
        position: absolute;
        left: 50%;
        bottom: 6%;
        width: 58%;
        height: 12%;
        transform: translateX(-50%);
        background: radial-gradient(circle, rgba(255, 169, 194, 0.28), transparent 72%);
        filter: blur(22px);
      }

      .bouquet-top {
        position: absolute;
        left: 50%;
        top: 13%;
        width: 72%;
        height: 20%;
        transform: translateX(-50%);
        border-radius: 50%;
        background:
          linear-gradient(180deg, rgba(255, 238, 242, 0.92), rgba(249, 201, 212, 0.92)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.4), transparent);
        box-shadow:
          inset 0 4px 0 rgba(255, 255, 255, 0.55),
          0 4px 10px rgba(0, 0, 0, 0.08);
      }

      .bouquet-top::after {
        content: "";
        position: absolute;
        inset: 14% 4% 18%;
        border-radius: 50%;
        background: linear-gradient(180deg, rgba(255, 207, 219, 0.95), rgba(247, 185, 201, 0.88));
      }

      .paper-cone {
        position: absolute;
        left: 50%;
        top: 19%;
        width: 54%;
        height: 56%;
        transform: translateX(-50%);
        clip-path: polygon(11% 0%, 89% 0%, 64% 100%, 36% 100%);
        background:
          linear-gradient(135deg, rgba(255, 244, 247, 0.98) 0%, rgba(247, 190, 204, 0.98) 40%, rgba(239, 150, 173, 0.98) 100%);
        border-radius: 0 0 42% 42%;
      }

      .paper-cone::before {
        content: "";
        position: absolute;
        inset: 1.5% 14% 9%;
        clip-path: polygon(18% 0%, 82% 0%, 57% 100%, 43% 100%);
        background: linear-gradient(180deg, rgba(255, 235, 240, 0.9), rgba(255, 255, 255, 0.08));
        opacity: 0.78;
      }

      .paper-cone::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.32), transparent 34%, rgba(223, 112, 143, 0.25) 82%, transparent);
        mix-blend-mode: screen;
      }

      .paper-flap {
        position: absolute;
        top: 14%;
        width: 34%;
        height: 20%;
        background: linear-gradient(180deg, rgba(255, 219, 229, 0.98), rgba(244, 169, 190, 0.92));
        z-index: 3;
      }

      .paper-flap.left {
        left: 10%;
        clip-path: polygon(0 12%, 100% 0, 85% 100%, 12% 88%);
        transform: rotate(-10deg);
      }

      .paper-flap.right {
        right: 10%;
        clip-path: polygon(0 0, 100% 12%, 88% 88%, 15% 100%);
        transform: rotate(10deg);
      }

      .stems {
        position: absolute;
        left: 50%;
        top: 31%;
        width: 46%;
        height: 56%;
        transform: translateX(-50%);
        z-index: 1;
      }

      .stem {
        position: absolute;
        bottom: 12%;
        width: 10px;
        height: 70%;
        border-radius: 999px;
        background: linear-gradient(180deg, #67c16d, #3e9c4f);
        transform-origin: bottom center;
        box-shadow: inset -2px 0 0 rgba(17, 90, 26, 0.22);
      }

      .stem.s1 { left: 18%; transform: rotate(-22deg); }
      .stem.s2 { left: 31%; transform: rotate(-10deg); height: 74%; }
      .stem.s3 { left: 46%; transform: rotate(0deg); height: 78%; }
      .stem.s4 { left: 59%; transform: rotate(12deg); height: 73%; }
      .stem.s5 { left: 72%; transform: rotate(24deg); height: 70%; }
      .stem.s6 { left: 40%; transform: rotate(-32deg); height: 64%; }
      .stem.s7 { left: 55%; transform: rotate(33deg); height: 63%; }

      .rose-cluster {
        position: absolute;
        inset: 0;
        z-index: 5;
      }

      .rose {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        height: calc(var(--size) * 1.02);
        transform: translate(-50%, -50%) rotate(var(--tilt));
        animation: sway var(--speed) ease-in-out infinite;
        animation-delay: var(--delay);
      }

      .rose::before,
      .rose::after {
        content: "";
        position: absolute;
      }

      .rose .bloom {
        position: absolute;
        inset: 0;
      }

      .rose .petal {
        position: absolute;
        background: var(--rose-main);
        border-radius: 60% 60% 40% 40%;
      }

      .rose .petal.left {
        width: 48%;
        height: 58%;
        left: 6%;
        top: 22%;
        transform: rotate(-28deg);
        border-radius: 66% 34% 48% 44%;
        background: linear-gradient(180deg, var(--rose-light), var(--rose-main));
      }

      .rose .petal.center {
        width: 38%;
        height: 70%;
        left: 31%;
        top: 6%;
        transform: rotate(-2deg);
        border-radius: 48% 48% 36% 36%;
        background: linear-gradient(180deg, #ff4054, #eb1f38);
      }

      .rose .petal.right {
        width: 50%;
        height: 57%;
        right: 5%;
        top: 22%;
        transform: rotate(28deg);
        border-radius: 34% 66% 44% 48%;
        background: linear-gradient(180deg, var(--rose-light), var(--rose-main));
      }

      .rose .petal.back-left,
      .rose .petal.back-right {
        width: 28%;
        height: 40%;
        top: 10%;
        z-index: -1;
      }

      .rose .petal.back-left {
        left: 16%;
        transform: rotate(-36deg);
        background: linear-gradient(180deg, #ff4a5d, #df1a31);
      }

      .rose .petal.back-right {
        right: 16%;
        transform: rotate(36deg);
        background: linear-gradient(180deg, #ff4a5d, #df1a31);
      }

      .rose .petal.base {
        width: 56%;
        height: 24%;
        left: 22%;
        bottom: 8%;
        border-radius: 0 0 45% 45%;
        background: linear-gradient(180deg, #ff4757, #ef273f);
      }

      .rose .inner {
        position: absolute;
        left: 50%;
        top: 27%;
        width: 28%;
        height: 31%;
        transform: translateX(-50%);
        border-radius: 44% 56% 40% 54%;
        background: linear-gradient(180deg, #7b0618, var(--rose-dark));
        box-shadow: inset 0 6px 0 rgba(255, 91, 112, 0.18);
      }

      .rose .inner::before {
        content: "";
        position: absolute;
        inset: 12% 22% 22% 14%;
        border-radius: 50%;
        background: rgba(64, 2, 13, 0.45);
      }

      .sepals {
        position: absolute;
        left: 50%;
        bottom: 10%;
        width: 48%;
        height: 22%;
        transform: translateX(-50%);
      }

      .sepal {
        position: absolute;
        bottom: 0;
        width: 38%;
        height: 72%;
        background: linear-gradient(180deg, #62c666, var(--leaf-dark));
        clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      }

      .sepal.left { left: 0; transform: rotate(-28deg); }
      .sepal.center { left: 31%; height: 86%; transform: rotate(1deg); }
      .sepal.right { right: 0; transform: rotate(28deg); }

      .leaf {
        position: absolute;
        width: 18%;
        height: 7%;
        background: linear-gradient(180deg, #79d27b, #46a84f);
        border-radius: 100% 0 100% 0;
        z-index: 4;
      }

      .leaf.l1 { left: 20%; top: 38%; transform: rotate(-28deg); }
      .leaf.l2 { right: 18%; top: 40%; transform: rotate(28deg) scaleX(-1); }
      .leaf.l3 { left: 34%; top: 49%; transform: rotate(12deg); }

      .ribbon-knot {
        position: absolute;
        left: 50%;
        bottom: 14%;
        width: 14%;
        height: 8%;
        transform: translateX(-50%);
        border-radius: 999px;
        background: linear-gradient(180deg, var(--ribbon), var(--ribbon-dark));
        z-index: 4;
        box-shadow: 0 4px 10px rgba(99, 13, 35, 0.16);
      }

      .ribbon-knot::before {
        content: "";
        position: absolute;
        inset: 14% 18%;
        border-radius: inherit;
        border: 2px solid rgba(255, 214, 224, 0.5);
      }

      .ribbon-loop {
        position: absolute;
        bottom: 13%;
        width: 10%;
        height: 7%;
        border: 8px solid var(--ribbon);
        border-radius: 50%;
        z-index: 3;
      }

      .ribbon-loop.left {
        left: 38%;
        transform: rotate(-24deg);
      }

      .ribbon-loop.right {
        right: 38%;
        transform: rotate(24deg);
      }

      .ribbon-tail {
        position: absolute;
        bottom: 2%;
        width: 11%;
        height: 15%;
        background: linear-gradient(180deg, #ffc4d1, #f2a1b7);
        z-index: 2;
      }

      .ribbon-tail.left {
        left: 40%;
        clip-path: polygon(0 0, 100% 16%, 78% 100%, 22% 74%);
        transform: rotate(7deg);
      }

      .ribbon-tail.right {
        right: 40%;
        clip-path: polygon(0 16%, 100% 0, 78% 74%, 22% 100%);
        transform: rotate(-7deg);
      }

      .stem-end {
        position: absolute;
        bottom: 1%;
        width: 10px;
        height: 16%;
        border-radius: 999px;
        background: linear-gradient(180deg, #57c761, #308e41);
        z-index: 1;
      }

      .stem-end.e1 { left: 42%; transform: rotate(18deg); }
      .stem-end.e2 { left: 48%; transform: rotate(6deg); }
      .stem-end.e3 { left: 54%; transform: rotate(-10deg); }

      .heart {
        position: absolute;
        right: 13%;
        bottom: 18%;
        width: clamp(48px, 8vw, 72px);
        aspect-ratio: 1;
        background: linear-gradient(180deg, #ff3b52, #ea1936);
        transform: rotate(-45deg);
        filter: drop-shadow(0 10px 12px rgba(133, 8, 31, 0.24));
        opacity: 0.95;
        animation: heartbeat 2.8s ease-in-out infinite;
      }

      .heart::before,
      .heart::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        background: linear-gradient(180deg, #ff3b52, #ea1936);
      }

      .heart::before {
        width: 100%;
        height: 100%;
        left: 0;
        top: -50%;
      }

      .heart::after {
        width: 100%;
        height: 100%;
        left: 50%;
        top: 0;
        box-shadow: inset 12px -10px 0 rgba(255, 255, 255, 0.06);
      }

      @media (max-width: 640px) {
        .scene {
          padding-top: 1.5rem;
          justify-content: flex-start;
        }

        .bouquet-wrap {
          width: min(96vw, 430px);
          margin-top: 0.4rem;
        }

        .bouquet {
          width: min(90vw, 360px);
        }

        .ribbon-loop {
          border-width: 6px;
        }

        .stem,
        .stem-end {
          width: 8px;
        }

        .heart {
          right: 8%;
          bottom: 17%;
        }
      }

      @media (max-width: 430px) {
        h1 {
          font-size: clamp(1.65rem, 8vw, 2.25rem);
        }

        .bouquet-wrap {
          aspect-ratio: 1 / 1.18;
        }

        .rose {
          transform: translate(-50%, -50%) rotate(var(--tilt)) scale(0.96);
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float-bouquet {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes sway {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(var(--tilt));
        }

        50% {
          transform: translate(-50%, calc(-50% - 4px)) rotate(calc(var(--tilt) + 1.5deg));
        }
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(0.9);
          opacity: 0.22;
        }

        50% {
          transform: translate3d(0, -16px, 0) scale(1.15);
          opacity: 0.65;
        }
      }

      @keyframes heartbeat {
        0%,
        100% {
          transform: rotate(-45deg) scale(1);
        }

        35% {
          transform: rotate(-45deg) scale(1.06);
        }

        65% {
          transform: rotate(-45deg) scale(0.98);
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <div class="subtitle-glow"></div>
      <h1>Flores para a minha querida e amada Flor</h1>

      <div class="sparkles" aria-hidden="true">
        <span style="--left: 13%; --top: 17%; --size: 8px; --duration: 4.2s; --delay: -1.1s;"></span>
        <span style="--left: 28%; --top: 10%; --size: 6px; --duration: 5.1s; --delay: -2.6s;"></span>
        <span style="--left: 71%; --top: 14%; --size: 7px; --duration: 4.8s; --delay: -0.8s;"></span>
        <span style="--left: 84%; --top: 22%; --size: 10px; --duration: 5.4s; --delay: -3.2s;"></span>
        <span style="--left: 17%; --top: 68%; --size: 7px; --duration: 5.9s; --delay: -2.2s;"></span>
        <span style="--left: 82%; --top: 72%; --size: 8px; --duration: 4.7s; --delay: -1.4s;"></span>
        <span style="--left: 57%; --top: 78%; --size: 5px; --duration: 4.1s; --delay: -2.9s;"></span>
      </div>

      <section class="bouquet-wrap" aria-label="Buquê de rosas vermelhas">
        <div class="bouquet">
          <div class="paper-shadow" aria-hidden="true"></div>
          <div class="bouquet-top" aria-hidden="true"></div>
          <div class="paper-cone" aria-hidden="true"></div>
          <div class="paper-flap left" aria-hidden="true"></div>
          <div class="paper-flap right" aria-hidden="true"></div>

          <div class="stems" aria-hidden="true">
            <div class="stem s1"></div>
            <div class="stem s2"></div>
            <div class="stem s3"></div>
            <div class="stem s4"></div>
            <div class="stem s5"></div>
            <div class="stem s6"></div>
            <div class="stem s7"></div>
          </div>

          <div class="leaf l1" aria-hidden="true"></div>
          <div class="leaf l2" aria-hidden="true"></div>
          <div class="leaf l3" aria-hidden="true"></div>

          <div class="rose-cluster">
            <article class="rose" style="--x: 22%; --y: 30%; --size: 120px; --tilt: -16deg; --speed: 4.3s; --delay: -1.5s;">
              <div class="bloom">
                <div class="petal back-left"></div>
                <div class="petal back-right"></div>
                <div class="petal left"></div>
                <div class="petal center"></div>
                <div class="petal right"></div>
                <div class="petal base"></div>
                <div class="inner"></div>
                <div class="sepals">
                  <div class="sepal left"></div>
                  <div class="sepal center"></div>
                  <div class="sepal right"></div>
                </div>
              </div>
            </article>

            <article class="rose" style="--x: 49.5%; --y: 16%; --size: 116px; --tilt: 2deg; --speed: 4.7s; --delay: -0.6s;">
              <div class="bloom">
                <div class="petal back-left"></div>
                <div class="petal back-right"></div>
                <div class="petal left"></div>
                <div class="petal center"></div>
                <div class="petal right"></div>
                <div class="petal base"></div>
                <div class="inner"></div>
                <div class="sepals">
                  <div class="sepal left"></div>
                  <div class="sepal center"></div>
                  <div class="sepal right"></div>
                </div>
              </div>
            </article>

            <article class="rose" style="--x: 74%; --y: 29%; --size: 118px; --tilt: 15deg; --speed: 4.5s; --delay: -2.1s;">
              <div class="bloom">
                <div class="petal back-left"></div>
                <div class="petal back-right"></div>
                <div class="petal left"></div>
                <div class="petal center"></div>
                <div class="petal right"></div>
                <div class="petal base"></div>
                <div class="inner"></div>
                <div class="sepals">
                  <div class="sepal left"></div>
                  <div class="sepal center"></div>
                  <div class="sepal right"></div>
                </div>
              </div>
            </article>

            <article class="rose" style="--x: 36%; --y: 39%; --size: 116px; --tilt: -9deg; --speed: 4.9s; --delay: -1.3s;">
              <div class="bloom">
                <div class="petal back-left"></div>
                <div class="petal back-right"></div>
                <div class="petal left"></div>
                <div class="petal center"></div>
                <div class="petal right"></div>
                <div class="petal base"></div>
                <div class="inner"></div>
                <div class="sepals">
                  <div class="sepal left"></div>
                  <div class="sepal center"></div>
                  <div class="sepal right"></div>
                </div>
              </div>
            </article>

            <article class="rose" style="--x: 60%; --y: 37%; --size: 122px; --tilt: 7deg; --speed: 4.4s; --delay: -2.7s;">
              <div class="bloom">
                <div class="petal back-left"></div>
                <div class="petal back-right"></div>
                <div class="petal left"></div>
                <div class="petal center"></div>
                <div class="petal right"></div>
                <div class="petal base"></div>
                <div class="inner"></div>
                <div class="sepals">
                  <div class="sepal left"></div>
                  <div class="sepal center"></div>
                  <div class="sepal right"></div>
                </div>
              </div>
            </article>
          </div>

          <div class="ribbon-loop left" aria-hidden="true"></div>
          <div class="ribbon-loop right" aria-hidden="true"></div>
          <div class="ribbon-knot" aria-hidden="true"></div>
          <div class="ribbon-tail left" aria-hidden="true"></div>
          <div class="ribbon-tail right" aria-hidden="true"></div>

          <div class="stem-end e1" aria-hidden="true"></div>
          <div class="stem-end e2" aria-hidden="true"></div>
          <div class="stem-end e3" aria-hidden="true"></div>

          <div class="heart" aria-hidden="true"></div>
        </div>
      </section>
    </main>
  </body>
</html>
