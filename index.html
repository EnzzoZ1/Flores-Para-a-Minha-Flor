<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flores para a minha querida e amada Flor</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --night: #06070d;
        --night-soft: #101426;
        --mist: rgba(208, 229, 255, 0.08);
        --spark: rgba(255, 237, 199, 0.9);
        --leaf-1: #1f6a43;
        --leaf-2: #2f8a5c;
        --leaf-3: #133924;
        --stem-1: #184c31;
        --stem-2: #2f7d53;
        --rose-1: #c81632;
        --rose-2: #8f112b;
        --rose-3: #5c081a;
        --rose-4: #ef6b89;
        --rose-shadow: rgba(33, 0, 10, 0.4);
        --gold: #f7d69d;
      }

      html,
      body {
        min-height: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: stretch;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(69, 92, 168, 0.14), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(255, 92, 138, 0.09), transparent 30%),
          radial-gradient(circle at 80% 10%, rgba(255, 226, 179, 0.08), transparent 24%),
          linear-gradient(180deg, #080912 0%, #0c1020 42%, #090a12 100%);
        color: #fff6ea;
        font-family: Georgia, "Times New Roman", serif;
      }

      .scene {
        position: relative;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        isolation: isolate;
      }

      /* Fundo noturno e brilho atmosférico */
      .night,
      .night::before,
      .night::after {
        position: absolute;
        inset: 0;
        content: "";
      }

      .night {
        background:
          radial-gradient(circle at center 115%, rgba(255, 103, 142, 0.11), transparent 28%),
          radial-gradient(circle at center, transparent 0 52%, rgba(4, 5, 10, 0.7) 92%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 35%);
        filter: saturate(1.08);
        z-index: -3;
      }

      .night::before {
        background:
          radial-gradient(circle at 12% 18%, var(--mist) 0 0.2rem, transparent 0.25rem),
          radial-gradient(circle at 86% 22%, rgba(255, 214, 153, 0.12) 0 0.24rem, transparent 0.28rem),
          radial-gradient(circle at 28% 68%, rgba(255, 189, 222, 0.08) 0 0.35rem, transparent 0.4rem);
        filter: blur(0.22rem);
        opacity: 0.7;
      }

      .night::after {
        background: linear-gradient(180deg, transparent 0%, rgba(5, 6, 12, 0.15) 55%, rgba(5, 6, 12, 0.45) 100%);
      }

      .title {
        position: absolute;
        top: clamp(1.5rem, 4vw, 2.75rem);
        left: 50%;
        transform: translateX(-50%);
        width: min(90vw, 58rem);
        padding: 0 1rem;
        text-align: center;
        font-size: clamp(1.35rem, 2vw + 0.8rem, 2.95rem);
        line-height: 1.2;
        letter-spacing: 0.04em;
        color: #fff1e3;
        text-shadow:
          0 0 0.75rem rgba(255, 183, 197, 0.22),
          0 0.12rem 1.4rem rgba(0, 0, 0, 0.5);
        animation: fade-in 2.4s ease forwards;
        opacity: 0;
        z-index: 4;
      }

      .title span {
        display: inline-block;
        padding-bottom: 0.25rem;
        border-bottom: 1px solid rgba(247, 214, 157, 0.35);
      }

      .glow-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(2rem);
        opacity: 0.35;
        z-index: -2;
      }

      .glow-orb--left {
        width: 18rem;
        height: 18rem;
        left: -3rem;
        bottom: 10rem;
        background: rgba(142, 22, 45, 0.24);
      }

      .glow-orb--right {
        width: 22rem;
        height: 22rem;
        right: -4rem;
        bottom: 8rem;
        background: rgba(255, 171, 201, 0.1);
      }

      .sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      .sparkle {
        position: absolute;
        bottom: -10vh;
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 50%;
        background:
          radial-gradient(circle at center, rgba(255, 251, 232, 0.95) 0 35%, rgba(255, 206, 150, 0.6) 45%, transparent 70%);
        box-shadow: 0 0 0.8rem rgba(255, 221, 177, 0.7);
        animation: drift var(--duration, 10s) linear infinite;
        animation-delay: var(--delay, 0s);
        left: var(--left, 50%);
        opacity: 0;
      }

      .bouquet {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: min(82vw, 42rem);
        height: min(84vh, 52rem);
        height: min(84dvh, 52rem);
        transform: translateX(-50%);
        pointer-events: none;
      }

      .bouquet::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 2rem;
        width: min(78vw, 28rem);
        height: 4rem;
        transform: translateX(-50%);
        background: radial-gradient(circle, rgba(0, 0, 0, 0.46) 0%, rgba(0, 0, 0, 0) 70%);
        filter: blur(1rem);
        z-index: 0;
      }

      /* Estrutura principal do buquê */
      .rose {
        position: absolute;
        left: 50%;
        bottom: 4rem;
        width: 8rem;
        height: calc(var(--stem-height) + 11rem);
        transform-origin: bottom center;
        transform: translateX(-50%) rotate(var(--angle)) scale(var(--scale, 1));
        animation: sway var(--sway, 5.2s) ease-in-out infinite;
        animation-delay: var(--sway-delay, 0s);
        z-index: var(--z, 2);
      }

      .rose__stem {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 1rem;
        height: var(--stem-height);
        transform: translateX(-50%);
        border-radius: 999px 999px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 35%, rgba(0, 0, 0, 0.22) 70%),
          linear-gradient(180deg, var(--stem-2) 0%, var(--stem-1) 100%);
        box-shadow:
          inset 0 0 0.28rem rgba(255, 255, 255, 0.12),
          0 0 0.65rem rgba(10, 30, 17, 0.22);
        animation: grow-stem 1.8s var(--delay) ease-out backwards;
      }

      .rose__stem::before {
        content: "";
        position: absolute;
        inset: 0.3rem 0.3rem auto;
        height: calc(100% - 0.6rem);
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 30%, transparent 70%, rgba(0, 0, 0, 0.12));
      }

      .thorn {
        position: absolute;
        width: 0.8rem;
        height: 0.55rem;
        background: linear-gradient(135deg, #427d52 0%, #0c2717 100%);
        clip-path: polygon(0 50%, 100% 0, 70% 100%);
        opacity: 0.75;
        animation: appear 1s calc(var(--delay) + 1.05s) backwards;
      }

      .thorn--1 {
        left: 58%;
        bottom: 28%;
        transform: rotate(18deg);
      }

      .thorn--2 {
        left: 30%;
        bottom: 52%;
        transform: scaleX(-1) rotate(12deg);
      }

      .leaf {
        position: absolute;
        width: var(--leaf-w);
        height: var(--leaf-h);
        bottom: var(--leaf-bottom);
        left: var(--leaf-left);
        transform-origin: bottom center;
        animation: leaf-grow 1.2s calc(var(--delay) + var(--leaf-delay)) ease-out backwards;
      }

      .leaf::before,
      .leaf::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 100% 0 100% 0;
      }

      .leaf::before {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 35%),
          linear-gradient(160deg, var(--leaf-2) 0%, var(--leaf-1) 56%, var(--leaf-3) 100%);
        box-shadow: inset 0 0 0.5rem rgba(255, 255, 255, 0.08);
      }

      .leaf::after {
        inset: 10% 46% 10% 46%;
        border-radius: 999px;
        background: rgba(238, 255, 242, 0.18);
        filter: blur(0.05rem);
      }

      .leaf--left {
        transform: rotate(-52deg) skewX(-6deg);
      }

      .leaf--right {
        transform: scaleX(-1) rotate(-52deg) skewX(-6deg);
      }

      .rose__bloom {
        position: absolute;
        left: 50%;
        bottom: calc(var(--stem-height) - 0.2rem);
        width: 9.5rem;
        height: 10rem;
        transform: translateX(-50%);
        animation: bloom 1.6s calc(var(--delay) + 0.45s) ease-out backwards;
      }

      .rose__base {
        position: absolute;
        left: 50%;
        bottom: 0.9rem;
        width: 2.1rem;
        height: 1.6rem;
        transform: translateX(-50%);
        background: linear-gradient(180deg, #3d7b4f 0%, #18311d 100%);
        clip-path: polygon(50% 100%, 0 25%, 22% 0, 50% 18%, 78% 0, 100% 25%);
        filter: drop-shadow(0 0.3rem 0.25rem rgba(0, 0, 0, 0.25));
        z-index: 1;
      }

      .petal {
        position: absolute;
        left: 50%;
        bottom: 1.1rem;
        width: var(--w, 3.6rem);
        height: var(--h, 4.4rem);
        transform-origin: 50% 90%;
        border-radius: 58% 58% 42% 42% / 42% 42% 58% 58%;
        background:
          radial-gradient(circle at 50% 26%, rgba(255, 210, 219, 0.34), transparent 33%),
          linear-gradient(180deg, var(--rose-4) 0%, var(--rose-1) 24%, var(--rose-2) 60%, var(--rose-3) 100%);
        box-shadow:
          inset 0 0.25rem 0.4rem rgba(255, 231, 237, 0.18),
          inset 0 -0.6rem 0.8rem rgba(52, 2, 14, 0.38),
          0 0.3rem 0.7rem rgba(28, 0, 7, 0.18);
        opacity: 0.98;
      }

      .petal::after {
        content: "";
        position: absolute;
        inset: 0.5rem 0.7rem 1rem;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 45%, rgba(82, 4, 21, 0.24));
        mix-blend-mode: screen;
        opacity: 0.7;
      }

      .petal--back-left {
        transform: translateX(-116%) rotate(-32deg);
        z-index: 1;
      }

      .petal--back-right {
        transform: translateX(18%) rotate(32deg);
        z-index: 1;
      }

      .petal--outer-left {
        --w: 4rem;
        --h: 4.8rem;
        transform: translateX(-96%) rotate(-54deg);
        z-index: 2;
      }

      .petal--outer-right {
        --w: 4rem;
        --h: 4.8rem;
        transform: translateX(-4%) rotate(54deg);
        z-index: 2;
      }

      .petal--mid-left {
        --w: 3.7rem;
        --h: 4.5rem;
        transform: translateX(-86%) rotate(-18deg);
        z-index: 3;
      }

      .petal--mid-right {
        --w: 3.7rem;
        --h: 4.5rem;
        transform: translateX(-14%) rotate(18deg);
        z-index: 3;
      }

      .petal--front-left {
        --w: 3.25rem;
        --h: 4rem;
        transform: translateX(-74%) rotate(-6deg);
        z-index: 5;
      }

      .petal--front-right {
        --w: 3.25rem;
        --h: 4rem;
        transform: translateX(-26%) rotate(6deg);
        z-index: 5;
      }

      .petal--crest {
        --w: 3.9rem;
        --h: 4.3rem;
        transform: translateX(-50%) rotate(0deg) translateY(-0.55rem);
        z-index: 4;
      }

      .petal--inner {
        --w: 2.25rem;
        --h: 3rem;
        left: 50%;
        bottom: 2.15rem;
        transform: translateX(-50%) rotate(2deg);
        border-radius: 48% 48% 44% 44% / 38% 38% 62% 62%;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 220, 226, 0.42), transparent 35%),
          linear-gradient(180deg, #ff9db1 0%, #dd3558 35%, #8e1230 75%, #4f0718 100%);
        z-index: 6;
      }

      .petal--inner::before {
        content: "";
        position: absolute;
        inset: 0.3rem 0.4rem 0.6rem;
        border-radius: 50%;
        border: 0.12rem solid rgba(255, 214, 224, 0.2);
        opacity: 0.8;
      }

      .petal--core {
        position: absolute;
        left: 50%;
        bottom: 2.75rem;
        width: 1.45rem;
        height: 2rem;
        transform: translateX(-50%);
        border-radius: 50% 50% 42% 42% / 42% 42% 58% 58%;
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 233, 239, 0.55) 0 18%, transparent 28%),
          linear-gradient(180deg, #ff9eb6 0%, #c11639 38%, #6c0d23 100%);
        box-shadow:
          inset 0 -0.35rem 0.4rem rgba(55, 1, 15, 0.35),
          0 0.25rem 0.4rem rgba(0, 0, 0, 0.15);
        z-index: 7;
      }

      .petal--core::after {
        content: "";
        position: absolute;
        top: 0.15rem;
        left: 50%;
        width: 1rem;
        height: 1.25rem;
        transform: translateX(-50%);
        border-radius: 50%;
        border: 0.1rem solid rgba(255, 220, 228, 0.18);
      }

      .rose__glow {
        position: absolute;
        left: 50%;
        bottom: calc(var(--stem-height) + 0.8rem);
        width: 8rem;
        height: 4rem;
        transform: translateX(-50%);
        background: radial-gradient(circle, rgba(255, 73, 116, 0.2) 0%, rgba(255, 73, 116, 0.05) 50%, transparent 72%);
        filter: blur(1rem);
        z-index: 0;
      }

      .filler {
        position: absolute;
        bottom: 1.5rem;
        width: 6rem;
        height: 20rem;
        transform-origin: bottom center;
        animation: sway-soft var(--sway, 6s) ease-in-out infinite;
        z-index: 1;
      }

      .filler__stem {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 0.8rem;
        height: 100%;
        transform: translateX(-50%);
        border-radius: 999px 999px 0 0;
        background: linear-gradient(180deg, #347d5a 0%, #163423 100%);
        animation: grow-stem 1.5s var(--delay, 0s) ease-out backwards;
        opacity: 0.82;
      }

      .filler__leaf {
        position: absolute;
        width: 2.8rem;
        height: 5.2rem;
        border-radius: 100% 0 100% 0;
        background: linear-gradient(150deg, #5ba877 0%, #245537 65%, #102617 100%);
        box-shadow: inset 0 0 0.35rem rgba(255, 255, 255, 0.12);
        animation: leaf-grow 1s calc(var(--delay, 0s) + 0.7s) ease-out backwards;
      }

      .filler__leaf::after {
        content: "";
        position: absolute;
        inset: 12% 47%;
        border-radius: 999px;
        background: rgba(231, 255, 237, 0.15);
      }

      .filler--left {
        left: 17%;
        transform: rotate(-22deg);
      }

      .filler--left .filler__leaf:nth-child(2) {
        left: 1.3rem;
        bottom: 5.5rem;
        transform: rotate(-28deg);
      }

      .filler--left .filler__leaf:nth-child(3) {
        left: -1.7rem;
        bottom: 9rem;
        transform: scaleX(-1) rotate(-18deg);
      }

      .filler--left .filler__leaf:nth-child(4) {
        left: 1.2rem;
        bottom: 12.3rem;
        transform: rotate(-12deg);
      }

      .filler--right {
        right: 17%;
        transform: scaleX(-1) rotate(-22deg);
      }

      .filler--right .filler__leaf:nth-child(2) {
        left: 1.2rem;
        bottom: 5.2rem;
        transform: rotate(-28deg);
      }

      .filler--right .filler__leaf:nth-child(3) {
        left: -1.6rem;
        bottom: 9.2rem;
        transform: scaleX(-1) rotate(-18deg);
      }

      .filler--right .filler__leaf:nth-child(4) {
        left: 1.1rem;
        bottom: 12.4rem;
        transform: rotate(-10deg);
      }

      .bouquet-wrap {
        position: absolute;
        left: 50%;
        bottom: 0.2rem;
        width: min(76vw, 27rem);
        height: 13rem;
        transform: translateX(-50%);
        z-index: 2;
      }

      .paper {
        position: absolute;
        bottom: 0;
        width: 55%;
        height: 100%;
        background:
          linear-gradient(180deg, rgba(255, 236, 226, 0.9), rgba(214, 181, 174, 0.82)),
          linear-gradient(135deg, rgba(255, 255, 255, 0.4), transparent 40%);
        box-shadow:
          inset 0 0 1rem rgba(255, 255, 255, 0.35),
          0 0.8rem 1.6rem rgba(0, 0, 0, 0.2);
        opacity: 0.94;
      }

      .paper--left {
        left: 2%;
        clip-path: polygon(0 0, 100% 14%, 74% 100%, 4% 100%);
        transform: rotate(-7deg);
      }

      .paper--right {
        right: 2%;
        clip-path: polygon(0 14%, 100% 0, 96% 100%, 26% 100%);
        transform: rotate(7deg);
      }

      .ribbon {
        position: absolute;
        left: 50%;
        bottom: 1.1rem;
        width: 9rem;
        height: 3.2rem;
        transform: translateX(-50%);
        z-index: 3;
      }

      .ribbon__knot {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 2.2rem;
        height: 2.2rem;
        transform: translate(-50%, -50%) rotate(45deg);
        border-radius: 0.55rem;
        background: linear-gradient(135deg, #8a1631 0%, #5f0d23 100%);
        box-shadow:
          inset 0 0 0.35rem rgba(255, 255, 255, 0.12),
          0 0.35rem 0.8rem rgba(0, 0, 0, 0.18);
      }

      .ribbon__loop,
      .ribbon__tail {
        position: absolute;
        top: 50%;
        background: linear-gradient(135deg, #b32141 0%, #7f1530 55%, #520a1d 100%);
        box-shadow: inset 0 0 0.35rem rgba(255, 255, 255, 0.14);
      }

      .ribbon__loop {
        width: 3.4rem;
        height: 2.1rem;
        border-radius: 100% 12% 100% 16%;
      }

      .ribbon__loop--left {
        left: 0.3rem;
        transform: translateY(-50%) rotate(-12deg);
      }

      .ribbon__loop--right {
        right: 0.3rem;
        transform: translateY(-50%) scaleX(-1) rotate(-12deg);
      }

      .ribbon__tail {
        width: 1.15rem;
        height: 3rem;
        top: 1.55rem;
        clip-path: polygon(0 0, 100% 0, 100% 84%, 50% 100%, 0 84%);
      }

      .ribbon__tail--left {
        left: 2.2rem;
        transform: rotate(8deg);
      }

      .ribbon__tail--right {
        right: 2.2rem;
        transform: rotate(-8deg);
      }

      .dust {
        position: absolute;
        inset: auto 0 0;
        height: 10rem;
        background:
          radial-gradient(circle at 20% 40%, rgba(255, 182, 193, 0.08), transparent 20%),
          radial-gradient(circle at 70% 30%, rgba(255, 222, 173, 0.09), transparent 18%),
          linear-gradient(180deg, transparent, rgba(6, 7, 13, 0.35));
        z-index: 1;
      }

      .rose--1 {
        --stem-height: 18rem;
        --angle: -18deg;
        --scale: 0.9;
        --delay: 0.2s;
        --sway: 6.2s;
        --z: 2;
        left: 25%;
      }

      .rose--2 {
        --stem-height: 20rem;
        --angle: -10deg;
        --scale: 0.96;
        --delay: 0.45s;
        --sway: 5.7s;
        --z: 3;
        left: 36%;
      }

      .rose--3 {
        --stem-height: 23rem;
        --angle: -4deg;
        --scale: 1.08;
        --delay: 0.7s;
        --sway: 5.3s;
        --z: 5;
        left: 48%;
      }

      .rose--4 {
        --stem-height: 19.5rem;
        --angle: 6deg;
        --scale: 0.98;
        --delay: 0.95s;
        --sway: 5.9s;
        --z: 4;
        left: 59%;
      }

      .rose--5 {
        --stem-height: 17.5rem;
        --angle: 16deg;
        --scale: 0.88;
        --delay: 1.2s;
        --sway: 6.1s;
        --z: 2;
        left: 71%;
      }

      .rose--6 {
        --stem-height: 15rem;
        --angle: -28deg;
        --scale: 0.78;
        --delay: 1.05s;
        --sway: 6.4s;
        --z: 1;
        left: 18%;
      }

      .rose--7 {
        --stem-height: 15.3rem;
        --angle: 26deg;
        --scale: 0.78;
        --delay: 1.35s;
        --sway: 6.4s;
        --z: 1;
        left: 78%;
      }

      .rose--1 .leaf--left {
        --leaf-w: 2.5rem;
        --leaf-h: 4.6rem;
        --leaf-bottom: 5.4rem;
        --leaf-left: -0.85rem;
        --leaf-delay: 0.35s;
      }

      .rose--1 .leaf--right {
        --leaf-w: 2.2rem;
        --leaf-h: 4rem;
        --leaf-bottom: 10.2rem;
        --leaf-left: 3.15rem;
        --leaf-delay: 0.55s;
      }

      .rose--2 .leaf--left {
        --leaf-w: 2.7rem;
        --leaf-h: 4.7rem;
        --leaf-bottom: 6rem;
        --leaf-left: -0.65rem;
        --leaf-delay: 0.35s;
      }

      .rose--2 .leaf--right {
        --leaf-w: 2.5rem;
        --leaf-h: 4.4rem;
        --leaf-bottom: 11.6rem;
        --leaf-left: 3.2rem;
        --leaf-delay: 0.6s;
      }

      .rose--3 .leaf--left {
        --leaf-w: 2.9rem;
        --leaf-h: 5rem;
        --leaf-bottom: 6rem;
        --leaf-left: -0.75rem;
        --leaf-delay: 0.38s;
      }

      .rose--3 .leaf--right {
        --leaf-w: 2.7rem;
        --leaf-h: 4.8rem;
        --leaf-bottom: 13.2rem;
        --leaf-left: 3.35rem;
        --leaf-delay: 0.62s;
      }

      .rose--4 .leaf--left {
        --leaf-w: 2.6rem;
        --leaf-h: 4.5rem;
        --leaf-bottom: 5.8rem;
        --leaf-left: -0.7rem;
        --leaf-delay: 0.34s;
      }

      .rose--4 .leaf--right {
        --leaf-w: 2.45rem;
        --leaf-h: 4.2rem;
        --leaf-bottom: 11rem;
        --leaf-left: 3.15rem;
        --leaf-delay: 0.56s;
      }

      .rose--5 .leaf--left {
        --leaf-w: 2.35rem;
        --leaf-h: 4.2rem;
        --leaf-bottom: 4.7rem;
        --leaf-left: -0.85rem;
        --leaf-delay: 0.34s;
      }

      .rose--5 .leaf--right {
        --leaf-w: 2.15rem;
        --leaf-h: 3.8rem;
